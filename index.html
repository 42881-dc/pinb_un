<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    
    <!-- สไตล์แต่งหน้าตาเว็บให้สวยงามและรองรับมือถือ -->
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .btn-start {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            box-shadow: 0 4px 6px -1px rgba(79, 70, 229, 0.2);
        }

        .btn-start:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-start:active {
            transform: translateY(1px);
        }

        #webcam-container {
            margin: 24px auto;
            border-radius: 12px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background-color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.06);
        }

        #webcam-container canvas {
            display: block;
            border-radius: 12px;
        }

        #label-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #f1f5f9;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .label-name {
            color: var(--text-main);
        }

        .label-prob {
            color: var(--primary-color);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Teachable Machine Image Model</h1>
    <p class="subtitle">ระบบตรวจจับวัตถุ (วิเคราะห์ทุกๆ 3 วินาที)</p>
    
    <button type="button" class="btn-start" id="start-btn" onclick="init()">เปิดกล้องเริ่มต้นทำงาน</button>
    
    <div id="webcam-container">
        <!-- กล้องจะแสดงตรงนี้ -->
        <span style="color: var(--text-muted); font-size: 0.875rem;">ไม่ได้เปิดกล้อง</span>
    </div>
    
    <div id="label-container">
        <!-- ผลลัพธ์จะแสดงตรงนี้ -->
    </div>
</div>

<!-- สคริปต์ TensorFlow และ Teachable Machine -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // ลิงก์โมเดลของคุณ
    const URL = "https://teachablemachine.withgoogle.com/models/1-kat_Cr7k/";

    let model, webcam, labelContainer, maxPredictions;
    let predictInterval; // ตัวแปรสำหรับเก็บรอบเวลา 3 วินาที

    async function init() {
        // ซ่อนปุ่มหรือเปลี่ยนข้อความหลังจากกด เพื่อป้องกันการกดซ้ำ
        const startBtn = document.getElementById("start-btn");
        startBtn.disabled = true;
        startBtn.innerText = "กำลังโหลดโมเดล...";

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        // โหลดโมเดล
        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        // ตั้งค่ากล้องเว็บแคม
        const flip = true; 
        webcam = new tmImage.Webcam(200, 200, flip); 
        await webcam.setup(); 
        await webcam.play();

        // เคลียร์ข้อความ "ไม่ได้เปิดกล้อง" ออก แล้วใส่ตัวสตรีมกล้องเข้าไปแทน
        const webcamContainer = document.getElementById("webcam-container");
        webcamContainer.innerHTML = "";
        webcamContainer.appendChild(webcam.canvas);

        // เตรียมพื้นที่แสดงผล Label ให้สวยงาม
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = ""; // ล้างค่าเก่า
        for (let i = 0; i < maxPredictions; i++) {
            const row = document.createElement("div");
            row.className = "label-row";
            
            row.innerHTML = `
                <span class="label-name">กำลังรอข้อมูล...</span>
                <span class="label-prob">0%</span>
            `;
            labelContainer.appendChild(row);
        }

        startBtn.innerText = "กำลังทำงาน...";

        // เริ่มลูปอัปเดตภาพของเว็บแคม (เพื่อให้ภาพเคลื่อนไหวลื่นไหลไม่กระตุก)
        window.requestAnimationFrame(loop);

        // ปรับตรงนี้! สั่งให้ฟังก์ชันวิเคราะห์ (predict) ทำงานทุกๆ 3000 มิลลิวินาที (3 วินาที)
        if(predictInterval) clearInterval(predictInterval);
        predictInterval = setInterval(async () => {
            await predict();
        }, 3000);
    }

    // ลูปสำหรับอัปเดตเฟรมภาพของกล้องเพื่อให้ภาพบนจอลื่นไหล
    async function loop() {
        webcam.update(); 
        window.requestAnimationFrame(loop);
    }

    // ฟังก์ชันวิเคราะห์ภาพ
    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const className = prediction[i].className;
            // แปลงค่าความน่าจะเป็นให้เป็นเปอร์เซ็นต์ (เช่น 0.95 -> 95%) เพื่อให้ผู้ใช้ดูง่ายขึ้น
            const probability = (prediction[i].probability * 100).toFixed(0) + "%";
            
            // อัปเดตข้อมูลลงในโครงสร้าง UI ใหม่
            const row = labelContainer.childNodes[i];
            row.querySelector(".label-name").innerText = className;
            row.querySelector(".label-prob").innerText = probability;
        }
    }
</script>

</body>
</html>
