<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model AI</title>
    <!-- โหลด Google Font เพื่อความทันสมัย -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Sarabun', sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* การ์ดสไตล์กระจกโปร่งแสง */
        .ai-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 35px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .ai-card h2 {
            color: var(--text-dark);
            margin: 0 0 10px 0;
            font-size: 24px;
            font-weight: 700;
        }

        .ai-card p.desc {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0 0 25px 0;
        }

        /* ปุ่มเปิดกล้อง */
        .btn-start {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-start:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
        }

        /* กล่องครอบกล้องเว็บแคม */
        .webcam-view {
            width: 220px;
            height: 220px;
            margin: 0 auto 25px auto;
            border-radius: 50%; /* เปลี่ยนเป็นทรงกลมสไตล์ล้ำๆ */
            overflow: hidden;
            border: 6px solid white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            background-color: #cbd5e1;
            display: none; /* ซ่อนไว้รอการเปิดกล้อง */
            position: relative;
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        /* รายการแสดงผลลัพธ์ */
        #label-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
        }

        .label-row {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.7);
            padding: 12px 18px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .class-text {
            font-weight: 600;
            color: #334155;
            font-size: 15px;
        }

        .percentage-badge {
            font-family: monospace;
            font-size: 15px;
            font-weight: 700;
            background-color: var(--primary-color);
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
            min-width: 45px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="ai-card">
    <h2>Image AI Detector</h2>
    <p class="desc">ระบบจะเปิดใช้งานกล้อง และทำการอัปเดตวิเคราะห์ผลทุกๆ 3 วินาที</p>
    
    <!-- ปุ่มสำหรับกดเริ่มต้น -->
    <button type="button" class="btn-start" onclick="init()">Start System</button>
    
    <!-- ส่วนแสดงกล้องเว็บแคม -->
    <div class="webcam-view" id="webcam-view">
        <div id="webcam-container"></div>
    </div>
    
    <!-- ส่วนแสดงผลความน่าจะเป็น -->
    <div id="label-container"></div>
</div>

<!-- โหลดไลบรารีตามโค้ดต้นฉบับของคุณ -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // ลิงก์โมเดลจากโค้ดเดิมของคุณ
    const URL = "https://teachablemachine.withgoogle.com/models/1-kat_Cr7k/";[cite: 3]

    let model, webcam, labelContainer, maxPredictions;
    let timerLoop; // ตัวแปรจัดการเวลา 3 วินาที

    // ทำหน้าที่โหลดโมเดลและเซ็ตอัปกล้อง
    async function init() {
        // ซ่อนปุ่ม และแสดงกรอบกล้องวงกลม
        document.querySelector(".btn-start").style.display = "none";
        document.getElementById("webcam-view").style.display = "block";

        const modelURL = URL + "model.json";[cite: 3]
        const metadataURL = URL + "metadata.json";[cite: 3]

        // โหลดโมเดล Teachable Machine
        model = await tmImage.load(modelURL, metadataURL);[cite: 3]
        maxPredictions = model.getTotalClasses();[cite: 3]

        // ตั้งค่ากล้อง
        const flip = true;[cite: 3]
        webcam = new tmImage.Webcam(220, 220, flip); // ปรับขนาดให้เข้ากับกรอบวงกลม[cite: 3]
        await webcam.setup(); // ขออนุญาตเข้าถึงกล้อง[cite: 3]
        await webcam.play();[cite: 3]
        
        // อัปเดตกล้องเฟรมแรกทันที
        webcam.update();

        // แสดงภาพกล้องลงในโฟลเดอร์ปลายทาง
        document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 3]
        labelContainer = document.getElementById("label-container");[cite: 3]
        
        // เจนแถบแสดงผลคลาสตามจำนวนคลาสในโมเดล[cite: 3]
        for (let i = 0; i < maxPredictions; i++) {[cite: 3]
            let row = document.createElement("div");
            row.className = "label-row";
            labelContainer.appendChild(row);[cite: 3]
        }

        // ประมวลผลรอบแรกทันที
        await predict();

        // เปลี่ยนระบบจากลูปรัวๆ มาใช้ setInterval ทำงานทุก 3000 มิลลิวินาที (3 วินาที) แทน
        timerLoop = setInterval(async () => {
            webcam.update(); // อัปเดตภาพจากกล้องตัวล่าสุด
            await predict();  // สั่งให้ AI คำนวณทำนายผล
        }, 3000);
    }

    // ฟังก์ชันรันโมเดลเพื่อจำแนกภาพ
    async function predict() {
        const prediction = await model.predict(webcam.canvas);[cite: 3]
        for (let i = 0; i < maxPredictions; i++) {[cite: 3]
            const className = prediction[i].className;[cite: 3]
            // แปลงค่าทศนิยมเดิม ให้เป็นเลขเปอร์เซ็นต์อ่านง่าย (เช่น 0.92 -> 92%)
            const percentValue = (prediction[i].probability * 100).toFixed(0) + "%";
            
            // แสดงข้อมูลจัดรูปแบบฝั่งซ้ายและขวาอย่างสมดุล
            labelContainer.childNodes[i].innerHTML = `
                <span class="class-text">${className}</span>
                <span class="percentage-badge">${percentValue}</span>
            `;
        }
    }
</script>

</body>
</html>
