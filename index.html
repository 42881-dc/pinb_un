<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model</title>
    <!-- นำเข้าฟอนต์เพื่อความสวยงามและอ่านง่าย -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* ปรับแต่งธีมพื้นหลังและจัดตำแหน่งกึ่งกลางหน้าจอ */
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* กล่องคอนเทนเนอร์หลัก */
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        h2 {
            margin-top: 0;
            color: #2c3e50;
            font-size: 24px;
            font-weight: 600;
        }

        p.subtitle {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* ปุ่มกดสไตล์โมเดิร์น */
        .btn-start {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2);
        }

        .btn-start:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(52, 152, 219, 0.3);
        }

        .btn-start:active {
            transform: translateY(0);
        }

        /* เฟรมแสดงผลของกล้องเว็บแคม */
        #webcam-container {
            margin: 25px auto;
            border-radius: 12px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            background-color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #webcam-container canvas {
            display: block;
        }

        /* ส่วนแสดงผลแถบวิเคราะห์สถานะ */
        #label-container {
            margin-top: 20px;
            text-align: left;
        }

        .prediction-item {
            background-color: #f8f9fa;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 4px solid #3498db;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Teachable Machine Image Model</h2>
    <p class="subtitle">กล้องจะจับภาพและวิเคราะห์ผลลัพธ์ในทุกๆ 3 วินาที</p>
    
    <!-- ปุ่มสำหรับเริ่มระบบ -->
    <button type="button" class="btn-start" onclick="init()">Start</button>
    
    <!-- พื้นที่แสดงกล้อง -->
    <div id="webcam-container"></div>
    
    <!-- พื้นที่แสดงผลลัพธ์การทำนาย -->
    <div id="label-container"></div>
</div>

<!-- โหลดไลบรารีที่จำเป็นจากชุดโค้ดเดิม -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    // ลิงก์โมเดลเดิมของคุณ
    const URL = "https://teachablemachine.withgoogle.com/models/1-kat_Cr7k/";[cite: 2]

    let model, webcam, labelContainer, maxPredictions;
    let predictInterval; // ตัวแปรสำหรับเก็บคำสั่งการทำงานเป็นรอบ (Interval)

    // โหลดโมเดลและตั้งค่ากล้องเว็บแคม
    async function init() {
        // ซ่อนปุ่มเปิดกล้องเมื่อระบบเริ่มทำงานแล้วเพื่อความสวยงามและป้องกันการกดซ้ำ
        document.querySelector(".btn-start").style.display = "none";

        const modelURL = URL + "model.json";[cite: 2]
        const metadataURL = URL + "metadata.json";[cite: 2]

        // โหลดตัวโมเดล
        model = await tmImage.load(modelURL, metadataURL);[cite: 2]
        maxPredictions = model.getTotalClasses();[cite: 2]

        // เซ็ตอัปเว็บแคม
        const flip = true;[cite: 2]
        webcam = new tmImage.Webcam(200, 200, flip); // กว้าง, สูง, พลิกด้านกล้อง
        await webcam.setup();[cite: 2]
        await webcam.play();[cite: 2]
        
        // อัปเดตเฟรมแรกของกล้องให้ขึ้นจอก่อน
        webcam.update();

        // แสดงผลกล้องลงในโฟลเดอร์ที่เราเตรียมไว้
        document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 2]
        labelContainer = document.getElementById("label-container");[cite: 2]
        
        // สร้างกรอบผลลัพธ์การทำนายรอไว้
        for (let i = 0; i < maxPredictions; i++) {[cite: 2]
            let itemDiv = document.createElement("div");
            itemDiv.className = "prediction-item";
            labelContainer.appendChild(itemDiv);[cite: 2]
        }

        // เรียกใช้งานทำนายผลครั้งแรกในทันที
        await predict();

        // ใช้ setInterval สั่งให้กล้องดึงภาพใหม่และประมวลผล ทุกๆ 3000 มิลลิวินาที (3 วินาที)
        predictInterval = setInterval(async () => {
            webcam.update(); // อัปเดตเฟรมจากกล้องตัวปัจจุบัน
            await predict();  // สั่งให้ทำนายภาพล่าสุด
        }, 3000);
    }

    // ฟังก์ชันคำนวณและดึงผลลัพธ์การทำนายจากโมเดล
    async function predict() {
        const prediction = await model.predict(webcam.canvas);[cite: 2]
        for (let i = 0; i < maxPredictions; i++) {[cite: 2]
            const className = prediction[i].className;[cite: 2]
            
            // แปลงค่าทศนิยมเดิมให้กลายเป็นเปอร์เซ็นต์ (%) เพื่อให้ผู้ใช้อ่านและเข้าใจได้ง่ายขึ้น
            const probabilityPercent = (prediction[i].probability * 100).toFixed(0) + "%"; 
            
            // แสดงผลลัพธ์แยกฝั่งซ้าย (ชื่อวัตถุ) และฝั่งขวา (เปอร์เซ็นต์ความมั่นใจ)
            labelContainer.childNodes[i].innerHTML = `<span>${className}</span> <strong>${probabilityPercent}</strong>`;
        }
    }
</script>

</body>
</html>
