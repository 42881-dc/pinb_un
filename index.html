<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Model AI</title>
    <!-- โหลด Google Font เพื่อความทันสมัย -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-dark: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Plus Jakarta Sans', 'Sarabun', sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .ai-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 35px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .ai-card h2 {
            color: var(--text-dark);
            margin: 0 0 10px 0;
            font-size: 24px;
            font-weight: 700;
        }

        .ai-card p.desc {
            color: var(--text-muted);
            font-size: 14px;
            margin: 0 0 25px 0;
        }

        .btn-start {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 14px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn-start:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
        }

        .webcam-view {
            width: 220px;
            height: 220px;
            margin: 0 auto 25px auto;
            border-radius: 50%;
            overflow: hidden;
            border: 6px solid white;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            background-color: #cbd5e1;
            display: none;
        }

        #webcam-container canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover;
        }

        #label-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: left;
        }

        .label-row {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.7);
            padding: 12px 18px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .class-text {
            font-weight: 600;
            color: #334155;
            font-size: 15px;
        }

        .percentage-badge {
            font-family: monospace;
            font-size: 15px;
            font-weight: 700;
            background-color: var(--primary-color);
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
            min-width: 45px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="ai-card">
    <h2>Image AI Detector</h2>
    <p class="desc">กล้องจะแสดงผลลื่นไหลปกติ แต่ระบบจะวิเคราะห์ผลใหม่ทุกๆ 3 วินาที</p>
    
    <button type="button" class="btn-start" onclick="init()">เปิดใช้งานระบบ</button>
    
    <div class="webcam-view" id="webcam-view">
        <div id="webcam-container"></div>
    </div>
    
    <div id="label-container"></div>
</div>

<!-- โหลดไลบรารีดั้งเดิม -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/1-kat_Cr7k/";[cite: 3]

    let model, webcam, labelContainer, maxPredictions;
    let lastPredictTime = 0; // ใช้บันทึกเวลาที่ทายผลล่าสุด

    async function init() {
        document.querySelector(".btn-start").style.display = "none";
        document.getElementById("webcam-view").style.display = "block";

        const modelURL = URL + "model.json";[cite: 3]
        const metadataURL = URL + "metadata.json";[cite: 3]

        model = await tmImage.load(modelURL, metadataURL);[cite: 3]
        maxPredictions = model.getTotalClasses();[cite: 3]

        const flip = true;[cite: 3]
        webcam = new tmImage.Webcam(220, 220, flip);[cite: 3]
        await webcam.setup(); 
        await webcam.play();[cite: 3]
        
        // รัน Loop ของกล้องวิดีโอ
        window.requestAnimationFrame(loop);[cite: 3]

        document.getElementById("webcam-container").appendChild(webcam.canvas);[cite: 3]
        labelContainer = document.getElementById("label-container");[cite: 3]
        
        for (let i = 0; i < maxPredictions; i++) {[cite: 3]
            let row = document.createElement("div");
            row.className = "label-row";
            labelContainer.appendChild(row);[cite: 3]
        }
    }

    // ฟังก์ชันนี้จะทำงานตลอดเวลาแบบ Real-time เพื่อให้ภาพกล้องลื่นไหล
    async function loop(timestamp) {
        webcam.update(); // อัปเดตเฟรมภาพกล้อง (ห้ามหน่วงตัวนี้ ไม่งั้นกล้องค้าง)
        
        // ตรวจสอบว่าเวลาผ่านไปครบ 3000 มิลลิวินาที (3 วินาที) หรือยัง
        if (!lastPredictTime || timestamp - lastPredictTime >= 3000) {
            lastPredictTime = timestamp; // บันทึกเวลาปัจจุบัน
            await predict(); // สั่งให้ AI ทายผลเฉพาะตอนครบ 3 วินาที
        }
        
        window.requestAnimationFrame(loop);[cite: 3]
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);[cite: 3]
        for (let i = 0; i < maxPredictions; i++) {[cite: 3]
            const className = prediction[i].className;[cite: 3]
            const percentValue = (prediction[i].probability * 100).toFixed(0) + "%";
            
            labelContainer.childNodes[i].innerHTML = `
                <span class="class-text">${className}</span>
                <span class="percentage-badge">${percentValue}</span>
            `;
        }
    }
</script>

</body>
</html>
